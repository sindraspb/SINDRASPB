<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINDRAS-PB</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <img src="logo.png" class="logo">

    <ul class="menu">
      <li><a href="noticias.html">Notícias</a></li>
      <li><a href="#quemSomos">Quem Somos</a></li>
      <li><a href="#agenda">Agenda</a></li>
      <li><a href="https://www.unasus.gov.br/" target="_blank">Cursos</a></li>
      <li><a href="parceiros.html">Parceiros</a></li>
    </ul>

    <div class="actions">
      <a href="admin.html" class="btn-black">ADM</a>
      <a href="#" class="btn-black">Filie-se</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="slides">
    <div class="slide" style="background-image:url('banner1.jpg')"></div>
    <div class="slide" style="background-image:url('banner2.jpg')"></div>
    <div class="slide" style="background-image:url('banner3.jpg')"></div>
    <div class="slide" style="background-image:url('banner4.jpg')"></div>
    <div class="slide" style="background-image:url('banner5.jpg')"></div>
    <div class="slide" style="background-image:url('banner6.jpg')"></div>
  </div>

  <div class="controls">
    <span onclick="mudarSlide(0)"></span>
    <span onclick="mudarSlide(1)"></span>
    <span onclick="mudarSlide(2)"></span>
    <span onclick="mudarSlide(3)"></span>
    <span onclick="mudarSlide(4)"></span>
    <span onclick="mudarSlide(5)"></span>
  </div>
</section>

<section class="video container">
  <iframe src="https://www.youtube.com/embed/iu5_eBhW4_s" allowfullscreen></iframe>
</section>

<section class="noticias container">
  <h2>Notícias</h2>
  <div id="noticias" class="cards"></div>
</section>

<section id="quemSomos" class="agenda">
  <div class="container agenda-banner">
    <h2>Quem Somos</h2>
    <div class="agenda-lista">
      <div class="evento">
        <p>O Sindras-PB é o Sindicato dos Agentes Comunitários de Saúde...</p>
      </div>
    </div>
  </div>
</section>

<section id="agenda" class="agenda">
  <div class="container agenda-banner">
    <h2>Agenda</h2>
    <div id="listaAgenda" class="agenda-lista"></div>
  </div>
</section>

<section class="social">
  <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
  <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
  <a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
  <a href="#" class="social-btn"><i class="fab fa-whatsapp"></i></a>
</section>

<footer class="footer">
  <p>© Sindras-PB 2024</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBmwz...",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551"
});

const db = getFirestore(app);

/* NOTICIAS */
const noticiasContainer = document.getElementById("noticias");

if(noticiasContainer){
  const q = query(collection(db,"noticias"), orderBy("criadoEm","desc"), limit(3));

  onSnapshot(q, snap=>{
    noticiasContainer.innerHTML = "";
    snap.forEach(doc=>{
      const n = doc.data();
      noticiasContainer.innerHTML += `
        <div class="card">
          <img src="${n.imagem}">
          <h3>${n.titulo}</h3>
          <p>${n.conteudo}</p>
        </div>`;
    });
  });
}

/* AGENDA */
const agendaContainer = document.getElementById("listaAgenda");

if(agendaContainer){
  onSnapshot(collection(db,"agenda"), snap=>{
    agendaContainer.innerHTML = "";
    snap.forEach(doc=>{
      const e = doc.data();
      agendaContainer.innerHTML += `
        <div class="evento">
          <h3>${e.titulo}</h3>
          <p>${e.dataInicio || ""} até ${e.dataFim || ""}</p>
          <p>${e.local || ""}</p>
        </div>`;
    });
  });
}
</script>

</body>
</html>
