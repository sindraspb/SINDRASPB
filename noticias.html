<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias - SINDRAS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <img src="logo.png" class="logo">

    <ul class="menu">
      <li><a href="index.html">Início</a></li>
      <li><a href="noticias.html">Notícias</a></li>
      <li><a href="parceiros.html">Parceiros</a></li>
    </ul>
  </div>
</header>

<section class="noticias container">
  <h1>Notícias</h1>
  <div id="listaNoticias" class="cards"></div>
</section>

<footer class="footer">
  <p>© Sindras-PB</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmwzsjxXLCU0M3SRf0v3C8cPTVvTzE6Hk",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("listaNoticias");

const q = query(
  collection(db,"noticias"),
  orderBy("criadoEm","desc")
);

onSnapshot(q, snap=>{
  container.innerHTML = "";

  snap.forEach(doc=>{
    const n = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${n.imagem}">
        <h3>${n.titulo}</h3>
        <p>${n.conteudo}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
