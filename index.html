<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmwzsjxXLCU0M3SRf0v3C8cPTVvTzE6Hk",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= NOTICIAS ================= */
const noticiasContainer = document.getElementById("noticias");

onSnapshot(collection(db,"noticias"), snap=>{
  noticiasContainer.innerHTML = "";

  snap.forEach(doc=>{
    const n = doc.data();

    noticiasContainer.innerHTML += `
      <div class="card">
        <img src="${n.imagem}">
        <h3>${n.titulo}</h3>
        <p>${n.conteudo}</p>
      </div>
    `;
  });
});

/* ================= AGENDA ================= */
const agendaContainer = document.getElementById("listaAgenda");

onSnapshot(collection(db,"agenda"), snap=>{
  agendaContainer.innerHTML = "";

  snap.forEach(doc=>{
    const e = doc.data();

    agendaContainer.innerHTML += `
      <div class="card">
        <h3>${e.titulo}</h3>
        <p>📅 ${e.dataInicio} até ${e.dataFim}</p>
        <p>📍 ${e.local}</p>
      </div>
    `;
  });
});
</script>

<!-- CARROSSEL -->
<script>
document.addEventListener("DOMContentLoaded", function(){

  let index = 0;

  const slides = document.querySelector('.slides');
  const slideItems = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.controls span');

  const total = slideItems.length;

  function showSlide(i){
    slides.style.transform = "translateX(" + (-i * 100) + "%)";
    dots.forEach(d => d.classList.remove("active"));
    if(dots[i]) dots[i].classList.add("active");
  }

  function nextSlide(){
    index++;
    if(index >= total){
      index = 0;
    }
    showSlide(index);
  }

  window.mudarSlide = function(i){
    index = i;
    showSlide(index);
  }

  setInterval(nextSlide, 4000);
  showSlide(index);

});
</script>
