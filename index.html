<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINDRAS-PB</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
header {
    background:#000; color:#fff;
    display:flex; justify-content:space-between;
    align-items:center; padding:15px;
}

.logo img { height:50px; }

nav { display:flex; }
nav a { color:#fff; margin-left:15px; text-decoration:none; }

/* MENU MOBILE */
.menu-toggle { display:none; flex-direction:column; cursor:pointer; }
.menu-toggle span {
    width:25px; height:3px; background:#fff;
    margin:4px; transition:.3s;
}

.menu-toggle.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.menu-toggle.active span:nth-child(2){opacity:0;}
.menu-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* BANNER */
.banner {
    height:350px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    text-align:center;
    position:relative;
}

.banner::before{
    content:"";
    position:absolute;
    width:100%; height:100%;
    background:url('banner.jpg') center/cover no-repeat;
}

.banner::after{
    content:"";
    position:absolute;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}

.banner-content{ position:relative; z-index:2; }

.botao{
    background:#d62828; color:#fff;
    padding:10px 20px; text-decoration:none;
    border-radius:5px;
}

/* NOTÍCIAS */
.noticia{
    background:#fff;
    margin:20px auto;
    padding:20px;
    max-width:600px;
    border-radius:8px;
}

/* RESPONSIVO */
@media(max-width:768px){
nav{
    position:absolute;
    top:70px;
    right:0;
    background:#000;
    flex-direction:column;
    width:200px;
    transform:translateX(100%);
    transition:.3s;
}
nav.active{ transform:translateX(0); }
.menu-toggle{ display:flex; }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png">
    </div>

    <div class="menu-toggle" onclick="toggleMenu(this)">
        <span></span><span></span><span></span>
    </div>

    <nav>
        <a href="#">Início</a>
        <a href="#noticias">Notícias</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<div class="banner">
    <div class="banner-content">
        <h2>SINDRAS-PB</h2>
        <p>Informação e apoio ao agente de saúde</p>
    </div>
</div>

<section id="noticias">
    <h2 style="text-align:center;">Notícias</h2>
    <div id="lista-noticias"></div>
</section>

<section id="contato" style="text-align:center;">
    <h2>Contato</h2>
    <a class="botao" href="https://wa.me/558330997966">WhatsApp</a>
</section>

<script>
function toggleMenu(btn){
    btn.classList.toggle("active");
    document.querySelector("nav").classList.toggle("active");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmwzsjxXLCU0M3SRf0v3C8cPTVvTzE6Hk",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551",
  storageBucket: "sindraspb-35551.firebasestorage.app",
  messagingSenderId: "1001203695194",
  appId: "1:1001203695194:web:b490ae077f26a83673e263"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista-noticias");

onSnapshot(collection(db, "noticias"), (snapshot) => {
    lista.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        lista.innerHTML += `
        <div class="noticia">
            <h3>${data.titulo}</h3>
            <p>${data.conteudo}</p>
        </div>
        `;
    });
});
</script>

</body>
</html>
