<!DOCTYPE html>

<head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <img src="logo.png" class="logo">

    <ul class="menu">
      <li>Início</li>
      <li>Notícias</li>

    <div class="actions">
      <a href="admin.html" class="btn-black">Blog</a>
      <a href="#" class="btn-black">Filie-se</a>
    </div>
  </div>
</header>

<!-- HERO (CARROSSEL) -->
<section class="hero">

  <div class="slides">

    <div class="slide" style="background-image:url('banner1.jpg')"></div>
    <div class="slide" style="background-image:url('banner2.jpg')"></div>
    <div class="slide" style="background-image:url('banner3.jpg')"></div>
    <div class="slide" style="background-image:url('banner4.jpg')"></div>
    <div class="slide" style="background-image:url('banner5.jpg')"></div>
    <div class="slide" style="background-image:url('banner6.jpg')"></div>

  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <span onclick="mudarSlide(0)"></span>
    <span onclick="mudarSlide(1)"></span>
    <span onclick="mudarSlide(2)"></span>
    <span onclick="mudarSlide(3)"></span>
    <span onclick="mudarSlide(4)"></span>
    <span onclick="mudarSlide(5)"></span>
  </div>

</section>

<!-- NOTICIAS -->
<section class="noticias container">
  <h2>Notícias</h2>
  <div id="noticias" class="cards"></div>

  <a href="https://www.youtube.com/watch?v=iu5_eBhW4_s" target="_blank" class="btn-social yt">YouTube</a>
  <a href="https://wa.me/558330997966" target="_blank" class="btn-social whats">WhatsApp</a>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Compromisso com a comunidade e bem-estar.</h2>
  <p>Somos uma equipe unida pela missão de apoiar e valorizar os agentes comunitários de saúde.</p>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© Sindras-PB 2024</p>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmwzsjxXLCU0M3SRf0v3C8cPTVvTzE6Hk",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("noticias");

onSnapshot(collection(db,"noticias"), snap=>{
  container.innerHTML = "";

  snap.forEach(doc=>{
    const n = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${n.imagem}">
        <h3>${n.titulo}</h3>
        <p>${n.conteudo}</p>
      </div>
    `;
  });
});
</script>

<!-- CARROSSEL -->
<script>
window.addEventListener("load", () => {

let index = 0;
const slides = document.querySelector('.slides');
const total = document.querySelectorAll('.slide').length;
const dots = document.querySelectorAll('.controls span');

function atualizar(){
  slides.style.transform = `translateX(-${index * 100}%)`;

  dots.forEach(d => d.classList.remove('active'));
  if(dots[index]) dots[index].classList.add('active');
}

window.mudarSlide = (i) => {
  index = i;
  atualizar();
}

setInterval(()=>{
  index = (index + 1) % total;
  atualizar();
}, 4000);

atualizar();

});
</script>

</body>
</html>
