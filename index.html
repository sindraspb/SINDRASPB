<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINDRAS-PB</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="container header-content">

    <div class="logo-area">
      <img src="logo.png" class="logo">
      <div class="logo-text">
        <strong>SINDRAS-PB</strong>
        <p>Sindicato dos ACS e ACE</p>
      </div>
    </div>

    <ul class="menu">
      <li><a href="noticias.html">Notícias</a></li>
      <li><a href="#agenda">Agenda</a></li>
      <li><a href="parceiros.html">Parceiros</a></li>
    </ul>

    <div class="actions">
      <a href="admin.html" class="btn-black">ADM</a>
      <a href="filiacao.html" class="btn-black">Filie-se</a>
    </div>

  </div>
</header>

<section class="noticias container">
  <h2>Últimas Notícias</h2>
  <div id="noticias" class="cards"></div>
</section>

<section id="agenda" class="agenda">
  <div class="container agenda-banner">
    <h2>Agenda</h2>
    <div id="listaAgenda" class="agenda-lista"></div>
  </div>
</section>

<footer class="footer">
  <p>© Sindras-PB</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "SUA_API",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID"
});

const db = getFirestore(app);

/* NOTICIAS */
const noticiasContainer = document.getElementById("noticias");

onSnapshot(
  query(collection(db,"noticias"), orderBy("criadoEm","desc"), limit(3)),
  snap=>{
    noticiasContainer.innerHTML="";
    snap.forEach(doc=>{
      const n = doc.data();

      noticiasContainer.innerHTML += `
        <div class="card">
          <img src="${n.imagem}">
          <h3>${n.titulo}</h3>
          <p>${n.conteudo.substring(0,100)}...</p>
          <a href="noticias.html" class="btn-black">Ver mais</a>
        </div>
      `;
    });
});

/* AGENDA */
const agendaContainer = document.getElementById("listaAgenda");

onSnapshot(
  query(collection(db,"agenda"), orderBy("dataInicio","asc")),
  snap=>{
    agendaContainer.innerHTML="";
    snap.forEach(doc=>{
      const e = doc.data();

      agendaContainer.innerHTML += `
        <div class="evento">
          <h3>${e.titulo}</h3>
          <p>${e.dataInicio}</p>
          <p>${e.local}</p>
          ${e.aviso ? `<p>⚠️ ${e.aviso}</p>` : ""}
        </div>
      `;
    });
});
</script>

</body>
</html>
