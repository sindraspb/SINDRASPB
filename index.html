<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SINDRAS-PB</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>SINDRAS-PB</h2>
</header>

<section class="banner">
  <h1>Bem-vindo ao SINDRAS</h1>
</section>

<section class="noticias">
  <h2>Notícias</h2>
  <div id="noticias"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmwzsjxXLCU0M3SRf0v3C8cPTVvTzE6Hk",
  authDomain: "sindraspb-35551.firebaseapp.com",
  projectId: "sindraspb-35551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("noticias");

onSnapshot(collection(db,"noticias"), snap=>{
  container.innerHTML = "";

  snap.forEach(doc=>{
    const n = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${n.imagem}" style="width:100%">
        <h3>${n.titulo}</h3>
        <p>${n.conteudo}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
