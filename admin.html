<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel SINDRAS</title>

<style>
body { margin:0; font-family:Arial; background:#eef1f5; }

.login {
  max-width:320px;
  margin:100px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

.dashboard { display:none; }

.topo {
  background:#1e1e2f;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.main { display:flex; }

.sidebar {
  width:220px;
  background:#2b2b3c;
  color:#fff;
  min-height:100vh;
  padding:20px;
}

.sidebar p {
  cursor:pointer;
  margin:15px 0;
}

.content { flex:1; padding:20px; }

.card {
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button {
  background:#d62828;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  padding:15px;
  margin-top:10px;
  border-radius:8px;
}

.item button {
  background:black;
}

.tela { display:none; }
.tela.active { display:block; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topo">
  <h3>Painel SINDRAS</h3>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<!-- MENU -->
<div class="sidebar">
  <p onclick="mostrar('home')">📊 Dashboard</p>
  <p onclick="mostrar('noticias')">📰 Notícias</p>
  <p onclick="mostrar('novaNoticia')">➕ Nova Notícia</p>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- DASH -->
<div id="home" class="tela active">
  <div class="card">
    <h3>Total de notícias</h3>
    <p id="totalNoticias">0</p>
  </div>
</div>

<!-- LISTA -->
<div id="noticias" class="tela">
  <div id="listaNoticias"></div>
</div>

<!-- NOVA -->
<div id="novaNoticia" class="tela">
  <div class="card">
    <h3>Nova Notícia</h3>

    <input id="tituloNoticia" placeholder="Título">
    <textarea id="conteudoNoticia" placeholder="Conteúdo"></textarea>

    <textarea id="imagensNoticia"
      placeholder="Cole links das imagens (uma por linha)"></textarea>

    <button onclick="salvarNoticia()">Publicar</button>
  </div>
</div>

</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SUA_AUTH",
  projectId: "sindraspb-35551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.entrar = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
  } catch(e){
    alert("Erro no login");
  }
};

window.sair = () => signOut(auth);

/* CONTROLE LOGIN */
onAuthStateChanged(auth, user=>{
  login.style.display = user ? "none" : "block";
  dashboard.style.display = user ? "block" : "none";
});

/* TROCAR TELA */
window.mostrar = (tela)=>{
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("active"));
  document.getElementById(tela).classList.add("active");
};

/* SALVAR NOTICIA */
window.salvarNoticia = async ()=>{
  const imagens = imagensNoticia.value
    .split(/\r?\n|\s+/)
    .map(i => i.trim())
    .filter(i => i.startsWith("http"));

  if(imagens.length === 0){
    alert("Adicione pelo menos uma imagem válida");
    return;
  }

  await addDoc(collection(db,"noticias"),{
    titulo: tituloNoticia.value,
    conteudo: conteudoNoticia.value,
    imagens: imagens,
    imagem: imagens[0],
    criadoEm: new Date()
  });

  alert("Publicado com várias imagens!");

  tituloNoticia.value="";
  conteudoNoticia.value="";
  imagensNoticia.value="";
};

/* EXCLUIR */
window.excluir = async (id)=>{
  if(confirm("Deseja excluir?")){
    await deleteDoc(doc(db,"noticias",id));
  }
};
</script>

</body>
</html>
